            text-transform: none;
            letter-spacing: normal;

            direction: ltr;

            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }

            animation: progress-shimmer 1.5s infinite linear;
        }

        @keyframes fade-in-out {
            0%, 100% { opacity: 0; transform: translateY(10px); }
            10%, 90% { opacity: 1; transform: translateY(0); }
        }
        .animate-text-cycle {
            animation: fade-in-out 3s infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 226, 225, 0.5);

<div class="w-full bg-surface-container rounded-full h-1.5 overflow-hidden mb-base relative">
<div class="absolute inset-0 bg-primary-container/20"></div>
<div class="h-full bg-gradient-to-r from-primary-container to-secondary-container w-1/3 animate-progress rounded-full"></div>
</div>
<!-- Cycling Text Component -->

<p class="font-label-md text-label-md text-primary-container animate-text-cycle" id="cycling-text">Fetching page...</p>

</div>

<script>
        const texts = [
            'Fetching page...',
            'Extracting metrics...',
            'Running rule engine...',
            'Generating AI insights...'
        ];
        let currentIndex = 0;
        const cyclingTextElement = document.getElementById('cycling-text');

        setInterval(() => {
            cyclingTextElement.style.opacity = '0';
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % texts.length;
                cyclingTextElement.textContent = texts[currentIndex];
                cyclingTextElement.style.opacity = '1';
            }, 300);
        }, 3000);
    </script>
