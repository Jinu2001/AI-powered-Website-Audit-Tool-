<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes progress-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-bar-glow {
            box-shadow: 0 0 15px rgba(78, 0, 142, 0.4);
        }
        .step-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-out;
        }
    </style>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-xl py-base max-w-container-max mx-auto">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="analytics">analytics</span>
<h1 class="font-headline-md text-headline-md tracking-tighter text-on-surface dark:text-inverse-on-surface">AUDIT•</h1>
</div>
<nav class="hidden md:flex items-center gap-lg">
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary-container dark:hover:text-primary-fixed transition-colors font-label-md text-label-md" href="#">Dashboard</a>
<a class="text-primary dark:text-inverse-primary font-bold border-b-2 border-primary font-label-md text-label-md" href="#">Audit</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary-container dark:hover:text-primary-fixed transition-colors font-label-md text-label-md" href="#">Insights</a>
</nav>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant dark:text-on-surface-variant cursor-pointer hover:text-primary transition-colors" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Main Content Canvas (Loading Screen) -->
<main class="flex-grow flex flex-col items-center justify-center relative overflow-hidden px-md">
<!-- Subtle Ambient Background Element -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">

</div>
<div class="z-10 w-full max-w-lg flex flex-col items-center text-center">
<!-- Icon/Visual Indicator -->
<div class="mb-lg relative">
<div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="search_check">search_check</span>
</div>
<div class="absolute inset-0 border-4 border-primary-container/20 rounded-full animate-ping opacity-25"></div>
</div>
<!-- Dynamic Step Text -->
<div class="h-12 flex items-center justify-center mb-md overflow-hidden">
<h2 class="font-headline-sm text-headline-sm text-on-surface step-transition opacity-100 transform translate-y-0" id="loading-step">
                    Fetching page...
                </h2>
</div>
<!-- Progress Bar Container -->
<div class="w-full h-1.5 bg-surface-variant rounded-full overflow-hidden mb-sm relative">
<!-- Static Progress Track -->
<div class="h-full bg-primary-container progress-bar-glow transition-all duration-700 ease-out" id="progress-indicator" style="width: 15%;">
<!-- Shimmer effect -->
<div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent animate-[progress-shimmer_1.5s_infinite]"></div>
</div>
</div>
<!-- Meta Data (URL being audited) -->
<div class="flex flex-col gap-xs mt-md">
<p class="text-outline font-label-md text-caption uppercase tracking-widest">Auditing Destination</p>
<div class="flex items-center gap-base justify-center">
<span class="material-symbols-outlined text-outline text-sm" data-icon="language">language</span>
<span class="text-on-surface-variant font-body-md text-body-md">https://enterprise-saas-solution.io/platform/overview</span>
</div>
</div>
<!-- Interactive Details Card (Modern Corporate Bento) -->
<div class="mt-xl w-full grid grid-cols-2 gap-md text-left opacity-60">
<div class="p-md bg-surface-container-lowest rounded-xl border border-surface-variant">
<p class="text-outline font-label-md text-caption uppercase mb-xs">Status</p>
<p class="font-label-md text-label-md text-on-surface">Initializing Engine</p>
</div>
<div class="p-md bg-surface-container-lowest rounded-xl border border-surface-variant">
<p class="text-outline font-label-md text-caption uppercase mb-xs">Rules Loaded</p>
<p class="font-label-md text-label-md text-on-surface">1,248 Active Checks</p>
</div>
</div>
</div>
</main>
<!-- Bottom Nav (Suppressed for loading screen per UX mandate) -->
<script>
        const steps = [
            { text: "Fetching page...", progress: 25 },
            { text: "Extracting metrics...", progress: 50 },
            { text: "Running rule engine...", progress: 75 },
            { text: "Generating AI insights...", progress: 92 }
        ];

        let currentStep = 0;
        const stepElement = document.getElementById('loading-step');
        const progressElement = document.getElementById('progress-indicator');

        function updateStep() {
            // Exit transition
            stepElement.classList.add('opacity-0', 'translate-y-2');
            
            setTimeout(() => {
                currentStep = (currentStep + 1) % steps.length;
                stepElement.innerText = steps[currentStep].text;
                progressElement.style.width = steps[currentStep].progress + '%';
                
                // Entrance transition
                stepElement.classList.remove('opacity-0', 'translate-y-2');
                stepElement.classList.add('opacity-100', 'translate-y-0');
            }, 400);
        }

        // Cycle through steps every 3 seconds
        setInterval(updateStep, 3000);

        // Interactive subtle shadow tilt based on mouse for the main container
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const container = document.querySelector('.z-10');
            container.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${-x}deg)`;
        });
    </script>
</body></html>
